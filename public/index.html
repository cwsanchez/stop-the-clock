<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta
      name="description"
      content="Stop the Clock! - A precision timing game. Stop the clock exactly when centiseconds hit 00 to score points and build your streak."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      `crossorigin="use-credentials"` makes the browser include cookies
      when fetching the manifest. Without it, protected Vercel preview
      deployments reject the (uncredentialed) manifest request with a
      401 because the `_vercel_sso_nonce` cookie isn't sent. This has
      no effect on public/production deployments since the manifest is
      same-origin.
      https://github.com/vercel/next.js/issues/62866
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" crossorigin="use-credentials" />
    <title>Stop the Clock!</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
